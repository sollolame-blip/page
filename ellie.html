<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ellie</title><style>
@import url('https://fonts.googleapis.com/css2?family=Parisienne&family=Great+Vibes&display=swap');

html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:#ff2a4f;
font-family:'Parisienne',cursive;
}

body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background-image:
radial-gradient(2px 2px at 20% 30%, white, transparent),
radial-gradient(2px 2px at 70% 40%, #ffd1e6, transparent),
radial-gradient(2px 2px at 40% 70%, white, transparent),
radial-gradient(2px 2px at 80% 80%, #ffd1e6, transparent),
radial-gradient(2px 2px at 10% 60%, white, transparent);
opacity:0;
animation:sparkle 3s ease-in-out infinite;
}

@keyframes sparkle{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

.ellie-text{
position:absolute;
top:10px;
width:100%;
text-align:center;
font-size:170px;
color:white;
letter-spacing:8px;
transform:scaleY(1.1);
text-shadow:
0 0 10px #ff0000,
0 0 25px #ff0000,
0 0 50px #ff1a1a,
0 0 90px #ff1a1a;
z-index:5;
}

.center-image{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation:float 2.5s ease-in-out infinite alternate;
width:420px;
filter:
 drop-shadow(0 0 25px white)
 drop-shadow(0 0 45px #ff9ad5)
 drop-shadow(0 0 80px #ff2f7a);
z-index:3;
}

.side-image{
position:absolute;
top:50%;
transform:translateY(-50%);
width:150px;
filter:
 drop-shadow(0 0 20px white)
 drop-shadow(0 0 35px #ff9ad5)
 drop-shadow(0 0 60px #ff2f7a);
z-index:2;
}

.left{ left:18%; }
.right{ right:18%; }

.signature{
position:absolute;
right:40px;
bottom:120px;
font-family:'Great Vibes',cursive;
font-size:70px;
color:#0a0a0a;
text-shadow:
0 0 6px #000,
0 0 12px #111,
0 0 18px #222;
transform:rotate(-6deg);
z-index:5;
}

/* black lines under signature */
.signature::after{
content:"";
display:block;
width:100%;
height:4px;
background-color:black;
margin-top:6px;
}
.signature::before{
content:"";
display:block;
width:100%;
height:2px;
background-color:black;
margin-top:2px;
}

@keyframes float{
from{ transform:translate(-50%,-50%) translateY(0px);} 
to{ transform:translate(-50%,-50%) translateY(35px);} 
}

.particle{
position:absolute;
pointer-events:none;
font-size:24px;
opacity:0.9;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px) rotate(0deg);opacity:1}
100%{transform:translateY(110vh) rotate(360deg);opacity:0}
}

</style></head><body><div class="ellie-text">Ellie</div><img src="roses.jpg" class="center-image">
<img src="cat.jpg" class="side-image left">
<img src="cat.jpg" class="side-image right"><div class="signature">Mutasemo</div><script>
const particles=['❄️','❤️','🌹','✨','💖','⭐','🌸'];
const body=document.body;
function createParticle(){
const p=document.createElement('div');
p.className='particle';
p.style.left=Math.random()*window.innerWidth+'px';
p.style.fontSize=(15+Math.random()*30)+'px';
p.style.animationDuration=(8+Math.random()*10)+'s';
p.innerText=particles[Math.floor(Math.random()*particles.length)];
body.appendChild(p);
setTimeout(()=>{p.remove();},18000);
}
setInterval(createParticle,250);
</script></body>
</html>
